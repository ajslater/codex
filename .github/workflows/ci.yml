name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - develop

env:
  IMAGE: ghcr.io/ajslater/codex
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint, test, and build the Python wheel (amd64 only)
  # ---------------------------------------------------------------------------
  test:
    name: Lint, Test & Build Dist
    runs-on: ubuntu-24.04
    # Branch gate logic
    if: |
      github.event_name == 'push' ||
      github.base_ref == 'main' ||
      (github.base_ref == 'develop' && github.head_ref == 'pre-release')
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build dist-builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: dist-builder
          load: true
          tags: dist-builder:ci
          cache-from: type=gha,scope=dist-builder-amd64
          cache-to: type=gha,scope=dist-builder-amd64,mode=max

      - name: Start CI container
        run: |
          mkdir -p dist test-results
          docker create --name ci \
            -v "${{ github.workspace }}/dist:/app/dist" \
            -v "${{ github.workspace }}/test-results:/app/test-results" \
            dist-builder:ci sleep infinity
          docker start ci

      - name: Lint
        run: docker exec ci make lint

      - name: "Frontend: Test"
        run: docker exec ci make test-frontend

      - name: "Frontend: Build"
        run: docker exec ci make build-frontend -o build-choices

      - name: "Backend: Test"
        run: docker exec ci make collectstatic django-check test-python -o build-frontend

      - name: Build Distribution
        run: docker exec ci make build-only

      - name: Stop CI container
        if: always()
        run: docker rm -f ci || true

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 1

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Discord notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "Test ${{ github.ref_name }} #${{ github.run_number }} ${{ job.status == 'success' && 'passed' || 'FAILED' }}"
          description: ${{ job.status == 'success' && 'Tested and built distribution for Codex' || 'Test or build failed' }}
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ---------------------------------------------------------------------------
  # Build per-arch Docker images natively and push to ghcr.io
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    needs: test
    if: github.ref != 'refs/heads/develop'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v4

      - name: Determine version
        id: meta
        run: |
          VERSION=$(uv version --short)
          WHEEL="codex-${VERSION}-py3-none-any.whl"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "wheel=${WHEEL}" >> "$GITHUB_OUTPUT"

      - name: Build & push arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: final
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            CODEX_WHEEL=${{ steps.meta.outputs.wheel }}
            CODEX_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
          annotations: |
            manifest:org.opencontainers.image.title=Codex
            manifest:org.opencontainers.image.description=Codex Comic Server
            manifest:org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            manifest:org.opencontainers.image.authors=AJ Slater <aj@slater.net>
            manifest:org.opencontainers.image.url=https://codex-reader.app
            manifest:org.opencontainers.image.source=https://github.com/ajslater/codex
            manifest:org.opencontainers.image.licenses=GPL-3.0-only
          cache-from: |
            type=gha,scope=dist-builder-${{ matrix.arch }}
            type=gha,scope=final-${{ matrix.arch }}
          cache-to: type=gha,scope=final-${{ matrix.arch }},mode=max

  # ---------------------------------------------------------------------------
  # Create multi-arch manifest, publish to PyPI, notify
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Create multi-arch manifest & push
        run: |
          VERSION=$(uv version --short)
          TAG_ARGS=(-t "${IMAGE}:${VERSION}")
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_ARGS+=(-t "${IMAGE}:latest")
          fi
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.title=Codex" \
            --annotation "index:org.opencontainers.image.description=Codex Comic Server" \
            --annotation "index:org.opencontainers.image.version=${VERSION}" \
            --annotation "index:org.opencontainers.image.authors=AJ Slater <aj@slater.net>" \
            --annotation "index:org.opencontainers.image.url=https://codex-reader.app" \
            --annotation "index:org.opencontainers.image.source=https://github.com/ajslater/codex" \
            --annotation "index:org.opencontainers.image.licenses=GPL-3.0-only" \
            "${TAG_ARGS[@]}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Discord notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "Deploy ${{ github.ref_name }} #${{ github.run_number }} ${{ job.status == 'success' && 'succeeded' || 'FAILED' }}"
          description: ${{ job.status == 'success' && 'Deployed Codex' || 'Deploy failed' }}
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
