name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

env:
  IMAGE: ghcr.io/ajslater/codex
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint, test, and build the Python wheel (amd64 only)
  # ---------------------------------------------------------------------------
  test:
    name: Lint, Test & Build Dist
    runs-on: ubuntu-24.04
    if: |
      github.ref_name == 'main' && github.event_name == 'push' || 
      github.base_ref == 'main' || 
      (github.base_ref == 'develop' && github.head_ref == 'pre-release')
    permissions:
      contents: read
      packages: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Only fetch full history for the main push gate
          fetch-depth: ${{ (github.ref_name == 'main' && github.event_name == 'push') && 0 || 1 }}

      - name: Check for Redundant Tests
        id: gate
        if: github.ref_name == 'main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_BRANCH=$(gh pr list --state merged --limit 1 --json headRefName --template '{{range .}}{{.headRefName}}{{end}}')
          if [ -n "$SOURCE_BRANCH" ]; then
            git fetch origin "$SOURCE_BRANCH" --depth=1
            if git diff --quiet HEAD "origin/$SOURCE_BRANCH"; then
              echo "identical=true" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Build dist-builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dist-builder
          load: true
          tags: dist-builder:ci
          cache-from: type=gha,scope=dist-builder-amd64
          cache-to: type=gha,scope=dist-builder-amd64,mode=max

      - name: Start Services
        run: |
          mkdir -p dist test-results
          docker compose up -d ci

      - name: Lint
        if: steps.gate.outputs.identical != 'true'
        run: docker exec codex-ci make lint

      - name: Tests
        id: tests
        if: steps.gate.outputs.identical != 'true'
        run: docker exec codex-ci make build-choices test-frontend build-frontend collectstatic django-check test-python

      - name: Build Distribution
        run: docker exec codex-ci make build-only

      - name: Stop Services
        run: docker compose down ci

      - name: Upload Test Results
        id: upload-tests
        if: "!cancelled() && steps.test.outcome != 'skipped'"
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/test-results/*.xml"

      - name: Publish Test Report
        if: "!cancelled() && steps.upload-tests.outcome == 'success'"
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/test-results/*.xml"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/
          retention-days: 1

      - name: Discord notification (Test Results)
        if: "!cancelled() && steps.gate.outputs.identical != 'true'"
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          color: ${{ job.status == 'success' && '0x28a745' || '0xd73a49' }}
          status: ${{ job.status }}
          content: "Tests for ${{ github.ref_name }} #${{ github.run_number }} ${{ job.status == 'success' && 'passed' || 'FAILED' }}"
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ---------------------------------------------------------------------------
  # Build per-arch Docker images natively
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Set Build Context
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          echo "CODEX_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "CODEX_WHEEL=$(ls dist/*.whl | xargs basename)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            CODEX_VERSION=${{ env.CODEX_VERSION }}
            CODEX_WHEEL=${{ env.CODEX_WHEEL }}
          tags: ${{ env.IMAGE }}:${{ env.CODEX_VERSION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,scope=build-${{ matrix.arch }},mode=max

  # ---------------------------------------------------------------------------
  # Create multi-arch manifest and publish
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: astral-sh/setup-uv@v8

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          VERSION=$(uv version --short)
          TAG_ARGS=("-t" "${IMAGE}:${VERSION}")

          # Positive regex check for Final versions (e.g., 1.2.3)
          if [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_ARGS+=("-t" "${IMAGE}:latest")
          fi

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.title=Codex" \
            --annotation "index:org.opencontainers.image.description=Codex Comic Server" \
            --annotation "index:org.opencontainers.image.version=${VERSION}" \
            --annotation "index:org.opencontainers.image.authors=AJ Slater <aj@slater.net>" \
            --annotation "index:org.opencontainers.image.url=https://codex-reader.app" \
            --annotation "index:org.opencontainers.image.source=https://github.com/ajslater/codex" \
            --annotation "index:org.opencontainers.image.licenses=GPL-3.0-only" \
            "${TAG_ARGS[@]}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Discord notification (Deploy Results)
        if: "!cancelled()"
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          color: ${{ job.status == 'success' && '0x28a745' || '0xd73a49' }}
          status: ${{ job.status }}
          content: "Deploy ${{ github.ref_name }} #${{ github.run_number }} ${{ job.status == 'success' && 'succeeded' || 'FAILED' }}"
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
