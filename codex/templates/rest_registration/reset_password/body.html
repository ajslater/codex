{# Email clients strip <style>/external CSS, so inline styles are required here. #}
{# djlint:off H021 #}
{% with username_q=user.username|urlencode %}
    {% with reset_url=verification_url|add:"&username="|add:username_q %}
        <!DOCTYPE html>
        <html lang="en">
            <head>
                <meta charset="utf-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>Reset your Codex password</title>
            </head>
            <body style="margin: 0; padding: 0; background-color: #f4f4f4">
                <table role="presentation"
                       width="100%"
                       border="0"
                       cellpadding="0"
                       cellspacing="0"
                       style="background-color: #f4f4f4">
                    <tr>
                        <td align="center" style="padding: 24px">
                            <table role="presentation"
                                   width="100%"
                                   border="0"
                                   cellpadding="0"
                                   cellspacing="0"
                                   style="max-width: 480px;
                                          background-color: #ffffff;
                                          border-radius: 8px">
                                <tr>
                                    <td style="padding: 32px;
                                               font-family: Arial, Helvetica, sans-serif;
                                               font-size: 16px;
                                               line-height: 1.5;
                                               color: #222222">
                                        <p style="margin: 0 0 16px">Hi {{ user.username }},</p>
                                        <p style="margin: 0 0 24px">
                                            A password reset was requested for your Codex account. Click
                                            the button below to choose a new password.
                                        </p>
                                        <table role="presentation"
                                               border="0"
                                               cellpadding="0"
                                               cellspacing="0"
                                               style="margin: 0 0 24px">
                                            <tr>
                                                <td align="center" bgcolor="#CC7B19" style="border-radius: 6px">
                                                    <a href="{{ reset_url }}"
                                                       style="display: inline-block;
                                                              padding: 13px 30px;
                                                              background-color: #cc7b19;
                                                              color: #ffffff;
                                                              font-weight: bold;
                                                              font-size: 16px;
                                                              text-decoration: none;
                                                              border-radius: 6px">Reset Password</a>
                                                </td>
                                            </tr>
                                        </table>
                                        <p style="margin: 0 0 8px; font-size: 13px; color: #666666">
                                            If the button doesn't work, copy and paste this link into your
                                            browser:
                                        </p>
                                        <p style=" margin: 0 0 24px; font-size: 13px; word-break: break-all; ">
                                            <a href="{{ reset_url }}" style="color: #cc7b19">{{ reset_url }}</a>
                                        </p>
                                        <p style="margin: 0; font-size: 13px; color: #666666">
                                            If you did not request this reset, you can ignore this email;
                                            your password will remain unchanged. The link expires after a
                                            short while and can only be used once.
                                        </p>
                                        <p style="margin: 24px 0 0; font-size: 13px; color: #999999">— Codex</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </body>
        </html>
    {% endwith %}
{% endwith %}
{# djlint:on #}
