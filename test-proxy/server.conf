# nginx server block for local reverse-proxy testing of a url_path_prefix
# (subpath) deployment. Run via bin/run-test-proxy.sh. Edit ports, proxy_pass,
# or routing here. Adapted from the linuxserver.io nginx default.conf sample;
# ports are remapped to 8080/8443 to run unprivileged and the SSL include
# points at this dir's ssl.conf instead of the container's /config path.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    listen 8443 ssl default_server;
    listen [::]:8443 ssl default_server;
    listen 8443 quic reuseport default_server;
    listen [::]:8443 quic reuseport default_server;

    server_name _;

    include ssl.conf;

    access_log /dev/stdout;
    error_log /dev/stderr;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # $host (the requested host), not $server_name — server_name is the "_"
    # catch-all here, and codex has USE_X_FORWARDED_HOST=True, so forwarding
    # "_" makes Django reject every dynamic request with DisallowedHost.
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    # proxy_set_header  X-Forwarded-Ssl   on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $scheme;
    # proxy_set_header Remote-User 'admin';
    # WS — $connection_upgrade is mapped from $http_upgrade in nginx.conf so
    # only real WebSocket requests carry "Connection: upgrade".
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/js text/xml text/javascript
    application/javascript application/json application/xml image/svg+xml;


    # Keep proxy_set_header OUT of this location: defining even one here makes
    # nginx drop every proxy_set_header inherited from the server block above
    # (incl. the WebSocket Upgrade/Connection headers), breaking ws proxying.
    location / {
        proxy_pass http://127.0.0.1:9810;
    }
}
