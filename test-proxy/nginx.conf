# Standalone wrapper so default.conf's server block runs without the
# linuxserver container. Launch via run-test-proxy.sh (nginx -p test-proxy).
worker_processes 1;
daemon off;
pid tmp/nginx.pid;
error_log /dev/stderr info;
events { worker_connections 1024; }
http {
    default_type application/octet-stream;
    access_log /dev/stdout;
    # WebSocket upgrade: Connection is "upgrade" only when the client sent an
    # Upgrade header, else "close" — so normal requests aren't proxied as
    # malformed upgrades. server.conf's proxy_set_header references this.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    client_body_temp_path tmp/client;
    proxy_temp_path tmp/proxy;
    fastcgi_temp_path tmp/fastcgi;
    uwsgi_temp_path tmp/uwsgi;
    scgi_temp_path tmp/scgi;
    include server.conf;
}
